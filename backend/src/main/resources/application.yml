spring:
  application:
    name: bidmart-auth-service

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://ep-xxxxx-xxxxx-12345.ap-southeast-1.aws.neon.tech/neondb?sslmode=require}
    username: ${DATABASE_USERNAME:neondb_owner}
    password: ${DATABASE_PASSWORD:your-neon-password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: 8081

app:
  base-url: ${APP_BASE_URL:http://localhost:8081}

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-change-in-production-please}
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

---
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:bidmart_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect