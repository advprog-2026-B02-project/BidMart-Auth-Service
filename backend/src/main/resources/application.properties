spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${MAIL_READ_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_WRITE_TIMEOUT:5000}
app.base-url=${APP_BASE_URL}
app.frontend.url=${APP_FRONTEND_URL:http://localhost:3000}
app.frontend-url=${APP_FRONTEND_URL:http://localhost:3000}
app.mail.enabled=${APP_MAIL_ENABLED:true}